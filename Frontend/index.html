<!DOCTYPE html>
<html>

<head>
    <title>House Price Predictor</title>
</head>

<body>

    <h2>🏠 House Price Prediction</h2>

    <label>Area:</label><br>
    <input id="area" type="number"><br><br>

    <label>Bedrooms:</label><br>
    <input id="bedrooms" type="number"><br><br>

    <label>Population:</label><br>
    <input id="population" type="number"><br><br>

    <label>Literacy Rate:</label><br>
    <input id="literacy" type="number" step="0.01"><br><br>

    <label>Price per Sqft:</label><br>
    <input id="pps" type="number"><br><br>

    <label>City:</label><br>
    <select id="city">
        <option>Bangalore</option>
        <option>Chennai</option>
        <option>Delhi</option>
        <option>Hyderabad</option>
        <option>Kolkata</option>
        <option>Mumbai</option>
    </select><br><br>

    <button onclick="predict()">Predict</button>

    <h3 id="result"></h3>

    <script>
        function predict() {
            fetch("http://127.0.0.1:5000/predict", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    area: parseFloat(document.getElementById("area").value),
                    bedrooms: parseInt(document.getElementById("bedrooms").value),
                    population: parseFloat(document.getElementById("population").value),
                    literacy: parseFloat(document.getElementById("literacy").value),
                    price_per_sqft: parseFloat(document.getElementById("pps").value),
                    city: document.getElementById("city").value
                })
            })
                .then(res => res.json())
                .then(data => {
                    document.getElementById("result").innerText =
                        "Predicted Price: ₹ " + data.price;
                })
                .catch(err => {
                    document.getElementById("result").innerText =
                        "Error connecting to server ❌";
                });
        }
    </script>

</body>

</html>
